name: Pages Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verify golden cases
        run: npm run verify:golden-cases

      - name: Build GitHub Pages bundle
        env:
          VITE_PRODUCT_ENGINE_MODE: local
          VITE_AVAILABLE_PROVIDERS: local
          VITE_PRODUCT_BASE_PATH: /VIBE-STUDIO/
        run: npm run build:product-web

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages bundle
        env:
          VITE_PRODUCT_ENGINE_MODE: local
          VITE_AVAILABLE_PROVIDERS: local
          VITE_PRODUCT_BASE_PATH: /VIBE-STUDIO/
        run: npm run build:deploy

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/product-web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
